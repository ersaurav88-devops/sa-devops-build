services:
  app:
    image: shouravawasthi/devops-build:latest
    ports:
      - "80:80"
    restart: always

  prometheus:
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    restart: always